<!DOCTYPE html>
<html>
<head>
<title>Javascript demo</title>
<link>
<script>
function showValue() {
  const value =
    document.getElementById("txtName").value;
  alert(value);
}
</script>
</head>
<body>
<h4> This is Javascript demo on DOM elements access</h4>
<input type="text" id="txtName">
<button onclick="showValue()">
  Show
</button>
</body>
</html>
